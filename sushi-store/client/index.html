    <!-- Дополнительные CSS анимации для модалок -->
    <style>
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      
      @keyframes slideIn {
        from { opacity: 0; transform: scale(0.9) translateY(-20px); }
        to { opacity: 1; transform: scale(1) translateY(0); }
      }
      
      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
      }
      
      .animate-fadeIn {
        animation: fadeIn 0.3s ease-out;
      }
      
      .animate-slideIn {
        animation: slideIn 0.4s ease-out;
      }
      
      .animate-pulse-slow {
        animation: pulse 2s infinite;
      }
      
      /* Кастомные градиенты */
      .gradient-text {
        background: linear-gradient(135deg, #f97316, #ef4444, #ec4899);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      
      /* Эффект стекла */
      .glass-effect {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.2);
      }
      
      /* Анимация появления модалки */
      .modal-enter {
        animation: slideIn 0.3s ease-out;
      }
      
      /* Эффект наведения для кнопок */

    <!-- Иконки FontAwesome для отображения иконок корзины -->
    <!-- Подключаем Font Awesome без integrity, чтобы избежать ошибок в браузерах, блокирующих некорректные атрибуты -->

      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      referrerpolicy="no-referrer"
    />

    <!-- Анимация пикселизации для смены слайдов на главном баннере -->
    <style>
      .pixel-fade-enter-active,
      .pixel-fade-leave-active {
        transition: opacity 0.6s ease, filter 0.6s ease;
      }
      .pixel-fade-enter-from,
      .pixel-fade-leave-to {
        opacity: 0;
        filter: blur(8px);
      }
      .pixel-fade-enter-to,
      .pixel-fade-leave-from {
        opacity: 1;
        filter: blur(0);
      }
      /* Плавное появление/исчезновение элементов меню */
      .fade-enter-active,
      .fade-leave-active {
        transition: opacity 0.3s ease;
      }
      .fade-enter-from,
      .fade-leave-to {
        opacity: 0;
      }
      
      /* Анимация появления превью корзины */
      .animate-fadeIn {
        animation: fadeIn 0.3s ease-out;
      }
      
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px) scale(0.95);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }
      
      /* Дополнительные анимации для Tailwind */
      .animate-pulse {
        animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }
      
      .animate-bounce {
        animation: bounce 1s infinite;
      }
      
      .animate-ping {
        animation: ping 1s cubic-bezier(0, 0, 0.2, 1) infinite;
      }
      
      /* Анимация загрузки */
      .loading-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #fef3c7 0%, #fed7aa 50%, #fecaca 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        opacity: 1;
        transition: opacity 0.5s ease-out;
      }
      
      .loading-overlay.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      
      .loading-container {
        text-align: center;
        max-width: 400px;
        width: 100%;
        padding: 2rem;
      }
      
      .sushi-animation {
        position: relative;
        margin-bottom: 3rem;
        height: 120px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      
      .sushi-roll {
        display: flex;
        gap: 4px;
        align-items: center;
        position: relative;
        z-index: 2;
      }
      
      .sushi-piece {
        width: 20px;
        height: 20px;
        background: linear-gradient(45deg, #fbbf24, #f59e0b);
        border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
        position: relative;
        animation: sushi-bounce 1.5s ease-in-out infinite;
        animation-delay: var(--delay);
        box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      }
      
      .sushi-piece::before {
        content: '';
        position: absolute;
        top: 2px;
        left: 2px;
        right: 2px;
        bottom: 2px;
        background: linear-gradient(45deg, #fde047, #facc15);
        border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      }
      
      .sushi-piece::after {
        content: '';
        position: absolute;
        top: 4px;
        left: 4px;
        right: 4px;
        bottom: 4px;
        background: linear-gradient(45deg, #dc2626, #b91c1c);
        border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      }
      
      .chopsticks {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 1;
      }
      
      .chopstick {
        position: absolute;
        width: 4px;
        height: 80px;
        background: linear-gradient(to bottom, #8b5cf6, #7c3aed);
        border-radius: 2px;
        animation: chopstick-rotate 2s ease-in-out infinite;
      }
      
      .chopstick.left {
        left: -20px;
        animation-delay: 0s;
      }
      
      .chopstick.right {
        right: -20px;
        animation-delay: 0.5s;
      }
      
      .loading-content {
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(10px);
        border-radius: 20px;
        padding: 2rem;
        box-shadow: 0 20px 40px rgba(0,0,0,0.1);
      }
      
      .loading-logo {
        margin-bottom: 2rem;
      }
      
      .loading-progress {
        margin-top: 1.5rem;
      }
      
      .progress-bar {
        width: 100%;
        height: 8px;
        background: #e5e7eb;
        border-radius: 4px;
        overflow: hidden;
        margin-bottom: 0.5rem;
      }
      
      .progress-fill {
        height: 100%;
        background: linear-gradient(90deg, #f59e0b, #dc2626, #f59e0b);
        background-size: 200% 100%;
        border-radius: 4px;
        animation: progress-shimmer 2s ease-in-out infinite;
        transition: width 0.3s ease;
      }
      
      .progress-text {
        font-size: 0.875rem;
        color: #6b7280;
        font-weight: 600;
      }
      
      @keyframes sushi-bounce {
        0%, 100% {
          transform: translateY(0) scale(1);
        }
        50% {
          transform: translateY(-20px) scale(1.1);
        }
      }
      
      @keyframes chopstick-rotate {
        0%, 100% {
          transform: rotate(0deg);
        }
        50% {
          transform: rotate(10deg);
        }
      }
      
      @keyframes progress-shimmer {
        0% {
          background-position: -200% 0;
        }
        100% {
          background-position: 200% 0;
        }
      }
      
      /* Стили для интерактивной карусели */
      .cursor-grab {
        cursor: grab;
      }
      
      .cursor-grabbing {
        cursor: grabbing;
      }
      
      .carousel-smooth {
        transition: transform 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      }
      
      /* Анимация при наведении на карточки */
      .carousel-card {
        transition: all 0.3s ease;
      }
      
      .carousel-card:hover {
        transform: translateY(-8px) scale(1.02);
        box-shadow: 0 20px 40px rgba(0,0,0,0.15);
      }
      
      /* Пульсирующая анимация для индикаторов */
      .carousel-dot-active {
        animation: pulse-dot 2s infinite;
      }
      
      @keyframes pulse-dot {
        0%, 100% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(1.2);
          opacity: 0.8;
        }
      }
      
      /* Анимация дождя из сушиков и пицц */
      .food-rain {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 1;
        overflow: hidden;
      }
      
      .food-item {
        position: absolute;
        font-size: 20px;
        animation: fall linear infinite;
        opacity: 0.7;
      }
      
      .food-item:nth-child(odd) {
        animation-duration: 3s;
        animation-delay: 0s;
      }
      
      .food-item:nth-child(even) {
        animation-duration: 4s;
        animation-delay: 1s;
      }
      
      .food-item:nth-child(3n) {
        animation-duration: 5s;
        animation-delay: 2s;
      }
      
      .food-item:nth-child(4n) {
        animation-duration: 3.5s;
        animation-delay: 0.5s;
      }
      
      .food-item:nth-child(5n) {
        animation-duration: 4.5s;
        animation-delay: 1.5s;
      }
      
      @keyframes fall {
        0% {
          transform: translateY(-100px) rotate(0deg);
          opacity: 0;
        }
        10% {
          opacity: 0.7;
        }
        90% {
          opacity: 0.7;
        }
        100% {
          transform: translateY(100vh) rotate(360deg);
          opacity: 0;
        }
      }
      
      /* Дополнительные анимации для разных типов еды */
      .sushi-item {
        animation: fall 3s linear infinite;
      }
      
      .pizza-item {
        animation: fall 4s linear infinite;
      }
      
      @keyframes sushi-wiggle {
        0%, 100% { transform: rotate(-5deg); }
        50% { transform: rotate(5deg); }
      }
      
      @keyframes pizza-spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      
      /* Анимация появления */
      .food-item {
        animation-fill-mode: both;
      }
      
      /* Разные размеры для разнообразия */
      .food-item.small {
        font-size: 16px;
        opacity: 0.5;
      }
      
      .food-item.medium {
        font-size: 20px;
        opacity: 0.7;
      }
      
      .food-item.large {
        font-size: 24px;
        opacity: 0.8;
      }
    </style>

  <!-- Общий фон сайта в мягких красных тонах -->
  <body class="bg-red-600 min-h-screen">
    <!-- Анимация дождя из сушиков и пицц -->
    <div id="food-rain" class="food-rain"></div>
    <div id="app"></div>
    <!-- Основные библиотеки -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://unpkg.com/vue-router@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <!-- Загружаем админские модули -->
    <script>
      // Загружаем модули через обычные script теги
      function loadModules() {
        // Загружаем модули последовательно
        const modules = [
          '/modules/auth.js',
          '/modules/account.js',
          '/modules/siteBuilder/elements.js',
          '/modules/siteBuilder/blocks/hero.js',
          '/modules/siteBuilder/blocks/categories.js',
          '/modules/siteBuilder/blocks/menu.js',
          '/modules/siteBuilder/blocks/delivery.js',
          '/modules/siteBuilder/blocks/reviews.js',
          '/modules/siteBuilder/blocks/map.js',
          '/modules/siteBuilder/styles.js',
          '/modules/siteBuilder/core.js',
          '/modules/adminSiteSettings.js',
          '/modules/admin.js',
          '/modules/home.js',
          '/modules/cartCheckout.js',
          '/modules/floatingCart.js'
        ];
        
        let loadedCount = 0;
        
        modules.forEach((src, index) => {
          const script = document.createElement('script');
          script.src = src + '?v=14';
          script.onload = () => {
            loadedCount++;
            console.log(`Модуль ${src} загружен`);
            if (loadedCount === modules.length) {
              console.log('Все модули загружены, запускаем основное приложение');
              loadMainApp();
            }
          };
          script.onerror = (error) => {
            console.error(`Ошибка загрузки модуля ${src}:`, error);
            loadedCount++;
            if (loadedCount === modules.length) {
              console.log('Запускаем основное приложение (с ошибками модулей)');
              loadMainApp();
            }
          };
          document.head.appendChild(script);
        });
      }
      
      // Функция для загрузки основного приложения
      function loadMainApp() {
        const script = document.createElement('script');
        script.src = '/main.js?v=24';
        script.onload = () => {
          console.log('Main.js загружен');
          // Вызываем обновление компонентов после загрузки main.js
          if (window.updateAdminComponents) {
            setTimeout(() => {
              window.updateAdminComponents();
              console.log('Админские компоненты обновлены');
              // Скрываем загрузку после обновления компонентов
              if (window.globalLoading) {
                setTimeout(() => {
                  window.globalLoading.isLoading = false;
                  console.log('Загрузка завершена');
                }, 1000);
              }
            }, 100);
          }
        };
        document.head.appendChild(script);
      }
      
      // Загружаем модули и запускаем приложение
      loadModules();
    </script>
  </body>
